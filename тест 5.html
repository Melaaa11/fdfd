<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Neon Castle</title>

<!-- THREE (no modules, works without server) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.PointLight(0xff00ff, 2, 50);
light.position.set(2,2,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

// ===== CASTLE =====
const castle = new THREE.Group();

function tower(x){
    const geo = new THREE.CylinderGeometry(0.5,0.5,2,16);
    const mat = new THREE.MeshStandardMaterial({color:0x111111, emissive:0xff00ff, emissiveIntensity:0.5});
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set(x,0,0);

    const roofGeo = new THREE.ConeGeometry(0.7,1,16);
    const roofMat = new THREE.MeshStandardMaterial({color:0x000000, emissive:0x00ffff, emissiveIntensity:0.8});
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = 1.5;

    mesh.add(roof);
    return mesh;
}

function wall(){
    const geo = new THREE.BoxGeometry(4,1.5,1);
    const mat = new THREE.MeshStandardMaterial({color:0x111111, emissive:0x2200ff, emissiveIntensity:0.4});
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.y = -0.5;
    return mesh;
}

castle.add(tower(-2));
castle.add(tower(2));
castle.add(wall());

scene.add(castle);

// ===== PARTICLES =====
const count = 300;
const particlesGeo = new THREE.BufferGeometry();
const positions = [];

for(let i=0;i<count;i++){
    positions.push((Math.random()-0.5)*10);
    positions.push((Math.random()-0.5)*10);
    positions.push((Math.random()-0.5)*10);
}

particlesGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const particlesMat = new THREE.PointsMaterial({color:0x00ffff, size:0.05});
const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

// ===== MOUSE PARALLAX =====
let mouseX = 0;
let mouseY = 0;

document.addEventListener('mousemove', (e)=>{
    mouseX = (e.clientX/window.innerWidth - 0.5)*2;
    mouseY = (e.clientY/window.innerHeight - 0.5)*2;
});

// ===== ANIMATE =====
function animate(){
    requestAnimationFrame(animate);

    castle.rotation.y += 0.003;

    // параллакс
    camera.position.x += (mouseX*2 - camera.position.x)*0.05;
    camera.position.y += (mouseY*2 - camera.position.y)*0.05;
    camera.lookAt(0,0,0);

    renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener('resize', ()=>{
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
