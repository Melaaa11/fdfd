<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon World Interactive</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { position:fixed; top:0; left:0; }
</style>
</head>
<body>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true}, undefined, (err)=>{
 console.error('Error loading model:', path, err);
});
renderer.setClearColor(0x000000, 1);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// BLOOM
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
composer.addPass(bloom);

camera.position.set(0,1,6);

// LIGHT
const light = new THREE.PointLight(0x00ffff, 2, 50);
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
light.position.set(0,3,5);
scene.add(light);

// ===== MODELS =====
const loader = new THREE.GLTFLoader();
let models = [];
let currentIndex = 0;

function loadModel(path){
 console.log('Loading model:', path);
 loader.load(path, (gltf)=>{
 console.log('Loaded:', path);
  const m = gltf.scene;
  m.scale.set(1.5,1.5,1.5);
  m.position.z = -5;
  m.visible = false;
  m.traverse(obj=>{
    if(obj.isMesh){
      obj.material.transparent = true;
      obj.material.opacity = 0;
    }
  });
  scene.add(m);
  models.push(m);

  if(models.length===1){
    fadeIn(m);
  }
 });
}

loadModel('castle.glb');
loadModel('village.glb');
loadModel('city.glb');

function fadeIn(model){
 model.visible = true;
 let opacity = 0;
 let interval = setInterval(()=>{
   opacity += 0.05;
   model.traverse(o=>{ if(o.material) o.material.opacity = opacity; });
   if(opacity>=1) clearInterval(interval);
 },50);
}

function fadeOut(model, cb){
 let opacity = 1;
 let interval = setInterval(()=>{
   opacity -= 0.05;
   model.traverse(o=>{ if(o.material) o.material.opacity = opacity; });
   if(opacity<=0){ clearInterval(interval); model.visible=false; cb(); }
 },50);
}

setInterval(()=>{
 if(models.length<2) return;
 let old = models[currentIndex];
 currentIndex = (currentIndex+1)%models.length;
 let next = models[currentIndex];

 fadeOut(old, ()=> fadeIn(next));
},7000);

// ===== CONTROLS (WASD) =====
const keys = {};
$(document).on('keydown', e=> keys[e.key.toLowerCase()] = true);
$(document).on('keyup', e=> keys[e.key.toLowerCase()] = false);

function moveCamera(){
 if(keys['w']) camera.position.z -= 0.1;
 if(keys['s']) camera.position.z += 0.1;
 if(keys['a']) camera.position.x -= 0.1;
 if(keys['d']) camera.position.x += 0.1;
}

// ===== PARTICLES =====
const count = 1000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);
const vel = [];

for(let i=0;i<count;i++){
 pos[i*3]=(Math.random()-0.5)*5;
 pos[i*3+1]=(Math.random()-0.5)*5;
 pos[i*3+2]=(Math.random()-0.5)*5;
 vel.push(new THREE.Vector3());
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({color:0x00ffff, size:0.05});
const points = new THREE.Points(geo, mat);
scene.add(points);

// mouse
let mouse={x:0,y:0};
$(document).on('mousemove',e=>{
 mouse.x=(e.clientX/innerWidth-0.5)*2;
 mouse.y=(e.clientY/innerHeight-0.5)*2;
});

// animate
function animate(){
 requestAnimationFrame(animate);

 moveCamera();

 for(let i=0;i<count;i++){
 let i3=i*3;
 vel[i].x+=(mouse.x-pos[i3])*0.02;
 vel[i].y+=(mouse.y-pos[i3+1])*0.02;
 pos[i3]+=vel[i].x;
 pos[i3+1]+=vel[i].y;
 pos[i3+2]+=vel[i].z;
 vel[i].multiplyScalar(0.9);
 }

 camera.position.x += (mouse.x*2 - camera.position.x)*0.05;
 camera.position.y += (mouse.y*2 - camera.position.y)*0.05;

 geo.attributes.position.needsUpdate=true;
 composer.render();
}

// fallback cube if models fail
const fallbackGeo = new THREE.BoxGeometry();
const fallbackMat = new THREE.MeshBasicMaterial({color:0xff00ff, wireframe:true});
const cube = new THREE.Mesh(fallbackGeo, fallbackMat);
scene.add(cube);

animate();

window.addEventListener('resize',()=>{
 renderer.setSize(innerWidth,innerHeight);
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 composer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
